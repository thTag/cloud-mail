name: 🚀 Deploy cloud-mail to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - "mail-vue/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout repository
        uses: actions/checkout@v6

      - name: ⚙️ Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: "./mail-vue/pnpm-lock.yaml"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: 📦 Install dependencies
        run: pnpm install
        working-directory: ./mail-vue

      - name: 🛠️ Build Vue app for Pages
        run: pnpm run build
        working-directory: ./mail-vue
        env:
          VITE_STATIC_URL: /cloud-mail/
          VITE_OUT_DIR: dist
          VITE_BASE_URL: /cloud-mail/api

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./mail-vue/dist

  deploy:
    name: 🚀 Deploy to Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
